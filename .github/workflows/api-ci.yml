name: API CI

on:
  push:
    branches:
      - main
    paths:
      # api and every workspace package it depends on (see docs/architecture.md)
      - 'packages/api/**'
      - 'packages/core/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/config/**'
      - 'packages/logger/**'
      - 'schema/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'packages/api/**'
      - 'packages/core/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/config/**'
      - 'packages/logger/**'
      - 'schema/**'
      - '.github/workflows/api-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Match the local development timezone so date-boundary tests
      # (added in PR #217 "fix-date-filter-timezone") are exercised against
      # the same UTC offset they were written for.
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Build better-sqlite3 native bindings
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release

      - name: Build dependencies
        run: pnpm --filter meme-gtd-api... build

      - name: Run lint
        run: pnpm --filter meme-gtd-api lint

      - name: Run tests
        run: pnpm --filter meme-gtd-api test

      - name: Generate OpenAPI spec
        run: pnpm --filter meme-gtd-api openapi:generate

      - name: Check committed OpenAPI spec is up to date
        run: git diff --exit-code packages/api/docs/api/openapi.yaml

      - name: Validate OpenAPI spec
        run: pnpm --filter meme-gtd-api openapi:validate
