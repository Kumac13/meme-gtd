  /api/search/keyword:
    get:
      operationId: keywordSearch
      summary: Keyword search
      tags:
        - Search
      description: Search issues by keyword using partial text matching across title, body, and comments
      parameters:
        - schema:
            type: string
            minLength: 1
          in: query
          name: q
          required: true
          description: Search query text
        - schema:
            type: integer
            exclusiveMinimum: true
            minimum: 0
            maximum: 100
            default: 20
          in: query
          name: limit
          required: false
          description: Maximum number of results to return
        - schema:
            type: integer
            minimum: 0
            default: 0
          in: query
          name: offset
          required: false
          description: Pagination offset
        - schema:
            type: string
          in: query
          name: types
          required: false
          description: Comma-separated issue types to include (memo,task,article)
        - schema:
            type: string
          in: query
          name: status
          required: false
          description: Filter by issue status (e.g., open, done)
        - schema:
            type: string
          in: query
          name: label
          required: false
          description: Filter by label names (comma-separated, OR logic)
        - schema:
            type: string
          in: query
          name: bookmarked
          required: false
          description: Filter by bookmarked status (set to "true" to show only bookmarked)
        - schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          in: query
          name: order
          required: false
          description: Sort order by updated_at
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          exclusiveMinimum: true
                          minimum: 0
                          description: Issue ID
                        type:
                          type: string
                          description: Issue type (memo, task, article)
                        title:
                          type: string
                          nullable: true
                          description: Issue title
                        bodyMd:
                          type: string
                          description: Issue body in Markdown
                        status:
                          type: string
                          nullable: true
                          description: Issue status
                        isBookmarked:
                          type: boolean
                          description: Whether the issue is bookmarked
                        labels:
                          type: array
                          items:
                            type: string
                          description: Labels assigned to the issue
                        commentCount:
                          type: integer
                          minimum: 0
                          description: Number of comments
                        createdAt:
                          type: string
                          description: Creation timestamp
                        updatedAt:
                          type: string
                          description: Last update timestamp
                        matches:
                          type: array
                          items:
                            type: object
                            properties:
                              field:
                                type: string
                                enum:
                                  - issue
                                  - comment
                                description: Where the match was found
                              commentId:
                                type: integer
                                nullable: true
                                description: Comment ID if match is in a comment
                              text:
                                type: string
                                description: Matched text
                            required:
                              - field
                              - commentId
                              - text
                            additionalProperties: false
                          description: Match details
                      required:
                        - id
                        - type
                        - title
                        - bodyMd
                        - status
                        - isBookmarked
                        - labels
                        - commentCount
                        - createdAt
                        - updatedAt
                        - matches
                      additionalProperties: false
                    description: Search results grouped by issue
                  total:
                    type: integer
                    minimum: 0
                    description: Total number of results
                  limit:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Page size
                  offset:
                    type: integer
                    minimum: 0
                    description: Current offset
                required:
                  - results
                  - total
                  - limit
                  - offset
                additionalProperties: false
  /api/search/semantic:
    get:
      operationId: semanticSearch
      summary: Semantic search
      tags:
        - Search
      description: Search issues by semantic similarity using vector embeddings
      parameters:
        - schema:
            type: string
            minLength: 1
          in: query
          name: q
          required: true
          description: Search query text
        - schema:
            type: integer
            exclusiveMinimum: true
            minimum: 0
            maximum: 100
            default: 20
          in: query
          name: limit
          required: false
          description: Maximum number of results to return
        - schema:
            type: string
          in: query
          name: types
          required: false
          description: Comma-separated issue types to include (memo,task,article)
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        issue:
                          type: object
                          properties:
                            id:
                              type: integer
                              exclusiveMinimum: true
                              minimum: 0
                              description: Issue ID
                            type:
                              type: string
                              description: Issue type (memo, task, article)
                            title:
                              type: string
                              nullable: true
                              description: Issue title
                            bodyMd:
                              type: string
                              description: Issue body in Markdown
                            createdAt:
                              type: string
                              description: Creation timestamp
                            updatedAt:
                              type: string
                              description: Last update timestamp
                          required:
                            - id
                            - type
                            - title
                            - bodyMd
                            - createdAt
                            - updatedAt
                          additionalProperties: false
                        score:
                          type: number
                          description: Combined relevance score
                        vectorScore:
                          type: number
                          description: Vector similarity score
                        matchReason:
                          type: array
                          items:
                            type: string
                          description: Reasons for the match
                      required:
                        - issue
                        - score
                        - vectorScore
                        - matchReason
                      additionalProperties: false
                    description: Search results sorted by relevance
                  meta:
                    type: object
                    properties:
                      query:
                        type: string
                        description: Original search query
                      totalResults:
                        type: integer
                        minimum: 0
                        description: Total number of results returned
                      searchTimeMs:
                        type: number
                        minimum: 0
                        description: Search duration in milliseconds
                    required:
                      - query
                      - totalResults
                      - searchTimeMs
                    additionalProperties: false
                required:
                  - results
                  - meta
                additionalProperties: false
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
