  /api/tasks:
    post:
      operationId: createTask
      summary: Create task
      tags:
        - Tasks
      description: Create a new task
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  description: Task title
                bodyMd:
                  type: string
                  description: Task description in Markdown format
                status:
                  type: string
                  enum:
                    - open
                    - next
                    - waiting
                    - scheduled
                    - done
                    - canceled
                  description: Task status (defaults to "open")
                scheduledOn:
                  type: string
                  format: date
                  description: Scheduled date for the task (YYYY-MM-DD)
              required:
                - title
              additionalProperties: false
        required: true
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique task ID
                  type:
                    type: string
                    enum:
                      - task
                    description: Issue type (always "task")
                  title:
                    type: string
                    description: Task title
                  bodyMd:
                    type: string
                    description: Task description in Markdown format
                  status:
                    type: string
                    enum:
                      - open
                      - next
                      - waiting
                      - scheduled
                      - done
                      - canceled
                    description: Current task status
                  scheduledOn:
                    type: string
                    format: date
                    nullable: true
                    description: Scheduled date for the task (YYYY-MM-DD, null if not scheduled)
                  meta:
                    type: object
                    additionalProperties: {}
                    description: Metadata object
                  isBookmarked:
                    type: boolean
                    description: Whether the task is bookmarked
