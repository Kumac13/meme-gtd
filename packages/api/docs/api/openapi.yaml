                  type: object
                  properties:
                    id:
                      type: integer
                      exclusiveMinimum: true
                      minimum: 0
                      description: Unique comment ID
                    issueId:
                      type: integer
                      exclusiveMinimum: true
                      minimum: 0
                      description: ID of the parent issue (memo or task)
                    bodyMd:
                      type: string
                      description: Comment content in Markdown format
                    createdAt:
                      type: string
                      format: date-time
                      description: Creation timestamp
