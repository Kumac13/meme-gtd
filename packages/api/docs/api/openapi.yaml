  /api/memos/{id}/promote:
    post:
      operationId: promoteMemo
      summary: Promote memo to task
      tags:
        - Memos
      description: Promote memo to task
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  description: Title for the new task
                status:
                  type: string
                  enum:
                    - inbox
                    - someday
                    - open
                    - next
                    - waiting
                    - scheduled
                  description: Initial status for the task
              required:
                - title
              additionalProperties: false
        required: true
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "200":
          description: Promoted task
          content:
            application/json:
              schema:
                description: Promoted task
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
