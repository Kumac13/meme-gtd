                  type: boolean
                  description: Bookmark status
              additionalProperties: false
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique memo ID
                  type:
                    type: string
                    enum:
                      - memo
                    description: Issue type (always "memo")
                  title:
                    type: string
                    nullable: true
                    description: Title (always null for memos)
                  bodyMd:
                    type: string
                    description: Memo content in Markdown format
                  status:
                    type: string
                    nullable: true
                    description: Status (always null for memos)
                  scheduledOn:
                    type: string
                    format: date
                    nullable: true
                    description: Scheduled date (always null for memos)
                  meta:
                    type: object
                    additionalProperties: {}
