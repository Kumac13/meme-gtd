openapi: 3.0.3
info:
  title: meme-gtd API
  description: HTTP REST API for meme-gtd CLI operations
  version: 0.9.0
components:
  schemas: {}
paths:
  /api/memos:
    post:
      operationId: createMemo
      summary: Create memo
      tags:
        - Memos
      description: Create a new memo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bodyMd:
                  type: string
                  minLength: 1
                  description: Memo content in Markdown format
              required:
                - bodyMd
              additionalProperties: false
        required: true
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique memo ID
                  type:
                    type: string
                    enum:
                      - memo
                    description: Issue type (always "memo")
                  title:
                    type: string
                    nullable: true
                    description: Title (always null for memos)
                  bodyMd:
                    type: string
                    description: Memo content in Markdown format
                  status:
                    type: string
                    nullable: true
                    description: Status (always null for memos)
                  scheduledOn:
                    type: string
                    format: date
                    nullable: true
                    description: Scheduled date (always null for memos)
                  meta:
                    type: object
                    additionalProperties: {}
                    description: Metadata object
                  isBookmarked:
                    type: boolean
                    description: Whether the memo is bookmarked
                  isDeleted:
                    type: boolean
                    description: Whether the memo is soft-deleted
                  createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp
                  updatedAt:
                    type: string
                    format: date-time
                    description: Last update timestamp
                  labels:
                    type: array
                    items:
                      type: string
                    description: Array of label names assigned to this memo
                required:
                  - id
                  - type
                  - title
                  - bodyMd
                  - status
                  - scheduledOn
                  - meta
                  - isBookmarked
                  - isDeleted
                  - createdAt
                  - updatedAt
                  - labels
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
    get:
      operationId: listMemos
      summary: List memos
      tags:
        - Memos
      description: List all memos with optional filters and pagination
      parameters:
        - schema:
            type: string
            enum:
              - "true"
              - "false"
          in: query
          name: bookmarked
          required: false
          description: Filter by bookmark status
        - schema:
            type: string
          in: query
          name: label
          required: false
          description: Filter by label name(s). Supports comma-separated values for OR logic (e.g., idea,meeting-notes)
        - schema:
            type: string
          in: query
          name: search
          required: false
          description: Search memos by body content using free-text partial matching
        - schema:
            type: integer
            minimum: 1
            maximum: 1000
          in: query
          name: limit
          required: false
          description: "Maximum number of memos to return (default: 100, max: 1000)"
        - schema:
            type: integer
            minimum: 0
          in: query
          name: offset
          required: false
          description: "Number of memos to skip (default: 0)"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          exclusiveMinimum: true
                          minimum: 0
                          description: Unique memo ID
                        type:
                          type: string
                          enum:
                            - memo
                          description: Issue type (always "memo")
                        title:
                          type: string
                          nullable: true
                          description: Title (always null for memos)
                        bodyMd:
                          type: string
                          description: Memo content in Markdown format
                        status:
                          type: string
                          nullable: true
                          description: Status (always null for memos)
                        scheduledOn:
                          type: string
                          format: date
                          nullable: true
                          description: Scheduled date (always null for memos)
                        meta:
                          type: object
                          additionalProperties: {}
                          description: Metadata object
                        isBookmarked:
                          type: boolean
                          description: Whether the memo is bookmarked
                        isDeleted:
                          type: boolean
                          description: Whether the memo is soft-deleted
                        createdAt:
                          type: string
                          format: date-time
                          description: Creation timestamp
                        updatedAt:
                          type: string
                          format: date-time
                          description: Last update timestamp
                        labels:
                          type: array
                          items:
                            type: string
                          description: Array of label names assigned to this memo
                        commentCount:
                          type: integer
                          minimum: 0
                          description: Number of non-deleted comments on this memo
                        preview:
                          type: string
                          description: Context preview with highlighted search terms (only present when search parameter is active)
                      required:
                        - id
                        - type
                        - title
                        - bodyMd
                        - status
                        - scheduledOn
                        - meta
                        - isBookmarked
                        - isDeleted
                        - createdAt
                        - updatedAt
                        - labels
                        - commentCount
                      additionalProperties: false
                    description: Array of memos
                  total:
                    type: integer
                    minimum: 0
                    description: Total count of memos matching the filters (ignoring pagination)
                  limit:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Maximum number of memos returned per page
                  offset:
                    type: integer
                    minimum: 0
                    description: Number of memos skipped
                required:
                  - data
                  - total
                  - limit
                  - offset
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
  /api/memos/{id}:
