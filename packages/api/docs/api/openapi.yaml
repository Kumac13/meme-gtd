                additionalProperties: false
    delete:
      operationId: deleteMemo
      summary: Delete memo
      tags:
        - Memos
      description: Delete memo (soft delete)
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "204":
          description: Default Response
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
