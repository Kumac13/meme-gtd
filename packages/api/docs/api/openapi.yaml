openapi: 3.0.3
info:
  title: meme-gtd API
  description: HTTP REST API for meme-gtd CLI operations
  version: 0.6.0
components:
  schemas: {}
paths:
  /api/memos:
    post:
      operationId: createMemo
      summary: Create memo
      tags:
        - Memos
      description: Create a new memo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bodyMd:
                  type: string
                  minLength: 1
                  description: Memo content in Markdown format
              required:
                - bodyMd
              additionalProperties: false
        required: true
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique memo ID
                  type:
                    type: string
                    enum:
                      - memo
                    description: Issue type (always "memo")
                  title:
                    type: string
                    nullable: true
                    description: Title (always null for memos)
                  bodyMd:
                    type: string
                    description: Memo content in Markdown format
                  status:
                    type: string
                    nullable: true
                    description: Status (always null for memos)
                  scheduledOn:
                    type: string
                    format: date
                    nullable: true
                    description: Scheduled date (always null for memos)
                  meta:
                    type: object
                    additionalProperties: {}
                    description: Metadata object
                  isBookmarked:
                    type: boolean
                    description: Whether the memo is bookmarked
                  isDeleted:
                    type: boolean
                    description: Whether the memo is soft-deleted
                  createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp
                  updatedAt:
                    type: string
                    format: date-time
                    description: Last update timestamp
                required:
                  - id
                  - type
                  - title
                  - bodyMd
                  - status
                  - scheduledOn
                  - meta
                  - isBookmarked
                  - isDeleted
                  - createdAt
                  - updatedAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
    get:
      operationId: listMemos
      summary: List memos
      tags:
        - Memos
      description: List all memos with optional filters
      parameters:
        - schema:
            type: string
            enum:
              - "true"
              - "false"
          in: query
          name: bookmarked
          required: false
          description: Filter by bookmark status
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      exclusiveMinimum: true
                      minimum: 0
                      description: Unique memo ID
                    type:
                      type: string
                      enum:
                        - memo
                      description: Issue type (always "memo")
                    title:
                      type: string
                      nullable: true
                      description: Title (always null for memos)
                    bodyMd:
                      type: string
                      description: Memo content in Markdown format
                    status:
                      type: string
                      nullable: true
                      description: Status (always null for memos)
                    scheduledOn:
                      type: string
                      format: date
                      nullable: true
                      description: Scheduled date (always null for memos)
                    meta:
                      type: object
                      additionalProperties: {}
                      description: Metadata object
                    isBookmarked:
                      type: boolean
                      description: Whether the memo is bookmarked
                    isDeleted:
                      type: boolean
                      description: Whether the memo is soft-deleted
                    createdAt:
                      type: string
                      format: date-time
                      description: Creation timestamp
                    updatedAt:
                      type: string
                      format: date-time
                      description: Last update timestamp
                  required:
                    - id
                    - type
                    - title
                    - bodyMd
                    - status
                    - scheduledOn
                    - meta
                    - isBookmarked
                    - isDeleted
                    - createdAt
                    - updatedAt
                  additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
  /api/memos/{id}:
    get:
      operationId: getMemo
      summary: Get memo
      tags:
        - Memos
      description: Get memo by ID
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique memo ID
                  type:
                    type: string
                    enum:
                      - memo
                    description: Issue type (always "memo")
                  title:
                    type: string
                    nullable: true
                    description: Title (always null for memos)
                  bodyMd:
                    type: string
                    description: Memo content in Markdown format
                  status:
                    type: string
                    nullable: true
                    description: Status (always null for memos)
                  scheduledOn:
                    type: string
                    format: date
                    nullable: true
                    description: Scheduled date (always null for memos)
                  meta:
                    type: object
                    additionalProperties: {}
                    description: Metadata object
                  isBookmarked:
                    type: boolean
                    description: Whether the memo is bookmarked
                  isDeleted:
                    type: boolean
                    description: Whether the memo is soft-deleted
                  createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp
                  updatedAt:
                    type: string
                    format: date-time
                    description: Last update timestamp
                  labels:
                    type: array
                    items:
                      type: string
                    description: Array of label names assigned to this memo
                  commentsCount:
                    type: integer
                    minimum: 0
                    description: Number of comments on this memo
                required:
                  - id
                  - type
                  - title
                  - bodyMd
                  - status
                  - scheduledOn
                  - meta
                  - isBookmarked
                  - isDeleted
                  - createdAt
                  - updatedAt
                additionalProperties: false
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
    patch:
      operationId: updateMemo
      summary: Update memo
      tags:
        - Memos
      description: Update memo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bodyMd:
                  type: string
                  minLength: 1
                  description: Updated memo content in Markdown format
                isBookmarked:
                  type: boolean
                  description: Bookmark status
              additionalProperties: false
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique memo ID
                  type:
                    type: string
                    enum:
                      - memo
                    description: Issue type (always "memo")
                  title:
                    type: string
                    nullable: true
                    description: Title (always null for memos)
                  bodyMd:
                    type: string
                    description: Memo content in Markdown format
                  status:
                    type: string
                    nullable: true
                    description: Status (always null for memos)
                  scheduledOn:
                    type: string
                    format: date
                    nullable: true
                    description: Scheduled date (always null for memos)
                  meta:
                    type: object
                    additionalProperties: {}
                    description: Metadata object
                  isBookmarked:
                    type: boolean
                    description: Whether the memo is bookmarked
                  isDeleted:
                    type: boolean
                    description: Whether the memo is soft-deleted
                  createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp
                  updatedAt:
                    type: string
                    format: date-time
                    description: Last update timestamp
                required:
                  - id
                  - type
                  - title
                  - bodyMd
                  - status
                  - scheduledOn
                  - meta
                  - isBookmarked
                  - isDeleted
                  - createdAt
                  - updatedAt
                additionalProperties: false
        "400":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
    delete:
      operationId: deleteMemo
      summary: Delete memo
      tags:
        - Memos
      description: Delete memo (soft delete)
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "204":
          description: Default Response
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                  stack:
                    type: string
                    description: Stack trace (only in development)
                required:
                  - error
                  - message
                additionalProperties: false
  /api/memos/{id}/promote:
    post:
      operationId: promoteMemo
      summary: Promote memo to task
      tags:
        - Memos
      description: Promote memo to task
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  description: Title for the new task
                status:
                  type: string
                  enum:
                    - open
                    - next
                    - waiting
                    - scheduled
                  description: Initial status for the task
              required:
                - title
              additionalProperties: false
        required: true
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Memo ID
      responses:
        "200":
          description: Promoted task
          content:
            application/json:
              schema:
                description: Promoted task
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error type or name
                  code:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
