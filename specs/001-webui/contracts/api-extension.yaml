# API Extension for Calendar View
# This extends the existing GET /api/tasks endpoint
# Date: 2025-11-25
# Branch: 001-webui

openapi: 3.0.3
info:
  title: Calendar View API Extension
  version: 1.0.0
  description: |
    Extension to existing GET /api/tasks endpoint for calendar functionality.
    Adds date range filtering parameters.

paths:
  /api/tasks:
    get:
      summary: List tasks (extended with date range filter)
      description: |
        Returns a list of tasks. Extended with scheduledFrom/scheduledTo
        parameters for calendar view date range filtering.
      parameters:
        # Existing parameters
        - name: status
          in: query
          schema:
            type: string
            enum: [inbox, open, next, waiting, scheduled, someday, done, canceled]
          description: Filter by task status
        - name: bookmarked
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: Filter by bookmark status
        - name: label
          in: query
          schema:
            type: string
          description: Filter by label name(s), comma-separated for OR logic
        - name: search
          in: query
          schema:
            type: string
          description: Search tasks by title

        # NEW: Date range parameters for calendar
        - name: scheduledFrom
          in: query
          schema:
            type: string
            format: date
            example: '2025-11-01'
          description: |
            Filter tasks where scheduled_on >= scheduledFrom.
            Format: YYYY-MM-DD
        - name: scheduledTo
          in: query
          schema:
            type: string
            format: date
            example: '2025-11-30'
          description: |
            Filter tasks where scheduled_on <= scheduledTo.
            Format: YYYY-MM-DD

      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskListItem'

components:
  schemas:
    TaskListItem:
      type: object
      properties:
        id:
          type: integer
          description: Unique task ID
        type:
          type: string
          enum: [task]
        title:
          type: string
          description: Task title
        bodyMd:
          type: string
          description: Task description in Markdown
        status:
          type: string
          enum: [inbox, open, next, waiting, scheduled, someday, done, canceled]
        scheduledOn:
          type: string
          format: date
          nullable: true
          description: Scheduled date (YYYY-MM-DD)
        startTime:
          type: string
          nullable: true
          description: Start time (HH:MM)
        endDate:
          type: string
          format: date
          nullable: true
          description: End date (YYYY-MM-DD)
        endTime:
          type: string
          nullable: true
          description: End time (HH:MM)
        duration:
          type: integer
          nullable: true
          description: Duration in minutes
        isBookmarked:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        labels:
          type: array
          items:
            type: string
        commentCount:
          type: integer
      required:
        - id
        - type
        - bodyMd
        - status
        - isBookmarked
        - isDeleted
        - createdAt
        - updatedAt
        - labels
        - commentCount

# Usage Examples:
#
# Calendar Month View (November 2025):
#   GET /api/tasks?scheduledFrom=2025-11-01&scheduledTo=2025-11-30
#
# Calendar Week View (Nov 24-30):
#   GET /api/tasks?scheduledFrom=2025-11-24&scheduledTo=2025-11-30
#
# Calendar Day View (Nov 25):
#   GET /api/tasks?scheduledFrom=2025-11-25&scheduledTo=2025-11-25
#
# Combined with status filter (exclude canceled):
#   GET /api/tasks?scheduledFrom=2025-11-01&scheduledTo=2025-11-30&status=next
