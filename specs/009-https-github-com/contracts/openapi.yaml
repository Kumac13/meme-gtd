openapi: 3.0.3
info:
  title: meme-gtd API
  description: |
    Getting Things Done (GTD) task management API.
    Provides HTTP access to all CLI operations (memo, task, label, link, comment).
  version: 0.6.0
  contact:
    name: meme-gtd
    url: https://github.com/Kumac13/meme-gtd

servers:
  - url: http://localhost:3000
    description: Development server
  - url: http://{tailscale-ip}:3000
    description: Production server (TailScale)
    variables:
      tailscale-ip:
        default: '192.168.1.100'
        description: TailScale IP address

tags:
  - name: Memos
    description: Memo (captured ideas) management
  - name: Tasks
    description: Task (actionable items) management
  - name: Labels
    description: Label management
  - name: Links
    description: Issue relationship management
  - name: Comments
    description: Comment management

paths:
  # ==================
  # Memo endpoints
  # ==================
  /api/memos:
    get:
      summary: List memos
      tags: [Memos]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: labelId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: bookmarked
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memo'
    post:
      summary: Create memo
      tags: [Memos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemoRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memo'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/memos/{id}:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    get:
      summary: Get memo by ID
      tags: [Memos]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update memo
      tags: [Memos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemoRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete memo (logical)
      tags: [Memos]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/memos/{id}/promote:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Promote memo to task
      tags: [Memos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoteMemoRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/memos/{id}/bookmark:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Bookmark memo
      tags: [Memos]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  isBookmarked:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/memos/{id}/unbookmark:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Unbookmark memo
      tags: [Memos]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  isBookmarked:
                    type: boolean
                    example: false
        '404':
          $ref: '#/components/responses/NotFound'

  /api/memos/{id}/comments:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    get:
      summary: List memo comments
      tags: [Memos, Comments]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Add comment to memo
      tags: [Memos, Comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/memos/{memoId}/comments/{commentId}:
    parameters:
      - name: memoId
        in: path
        required: true
        schema:
          type: integer
      - name: commentId
        in: path
        required: true
        schema:
          type: integer
    patch:
      summary: Update memo comment
      tags: [Memos, Comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete memo comment (logical)
      tags: [Memos, Comments]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================
  # Task endpoints
  # ==================
  /api/tasks:
    get:
      summary: List tasks
      tags: [Tasks]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: labelId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: bookmarked
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Create task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    get:
      summary: Get task by ID
      tags: [Tasks]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete task (logical)
      tags: [Tasks]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/close:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Close task (set status to done)
      tags: [Tasks]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: Optional comment
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Cancel task (set status to canceled)
      tags: [Tasks]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: Optional comment
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/reopen:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Reopen task (set status to open)
      tags: [Tasks]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/bookmark:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Bookmark task
      tags: [Tasks]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  isBookmarked:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/unbookmark:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    post:
      summary: Unbookmark task
      tags: [Tasks]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  isBookmarked:
                    type: boolean
                    example: false
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/comments:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    get:
      summary: List task comments
      tags: [Tasks, Comments]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Add comment to task
      tags: [Tasks, Comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{taskId}/comments/{commentId}:
    parameters:
      - name: taskId
        in: path
        required: true
        schema:
          type: integer
      - name: commentId
        in: path
        required: true
        schema:
          type: integer
    patch:
      summary: Update task comment
      tags: [Tasks, Comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete task comment (logical)
      tags: [Tasks, Comments]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================
  # Label endpoints
  # ==================
  /api/labels:
    get:
      summary: List all labels
      tags: [Labels]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Label'
    post:
      summary: Create label
      tags: [Labels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabelRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/labels/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete label by name
      tags: [Labels]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  deleted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/issues/{issueId}/labels:
    parameters:
      - name: issueId
        in: path
        required: true
        schema:
          type: integer
    post:
      summary: Assign label to issue
      tags: [Labels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignLabelRequest'
      responses:
        '200':
          description: Success (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  issueId:
                    type: integer
                  labelId:
                    type: integer
                  assignedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================
  # Link endpoints
  # ==================
  /api/links:
    post:
      summary: Create link between issues
      tags: [Links]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/links/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    delete:
      summary: Delete link
      tags: [Links]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'

  /api/issues/{id}/links:
    parameters:
      - $ref: '#/components/parameters/IssueId'
    get:
      summary: List links for issue
      tags: [Links]
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/LinkType'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LinkWithDirection'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    IssueId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Issue ID (memo or task)

  schemas:
    # ==================
    # Memo schemas
    # ==================
    Memo:
      type: object
      required: [id, type, bodyMd, isBookmarked, createdAt, updatedAt]
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum: [memo]
        bodyMd:
          type: string
          example: "Meeting notes from 2025-10-20"
        isBookmarked:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MemoDetail:
      allOf:
        - $ref: '#/components/schemas/Memo'
        - type: object
          properties:
            labels:
              type: array
              items:
                $ref: '#/components/schemas/Label'
            comments:
              type: array
              items:
                $ref: '#/components/schemas/Comment'

    CreateMemoRequest:
      type: object
      required: [bodyMd]
      properties:
        bodyMd:
          type: string
          minLength: 1
        labels:
          type: array
          items:
            type: string

    UpdateMemoRequest:
      type: object
      properties:
        bodyMd:
          type: string
          minLength: 1

    PromoteMemoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        bodyMd:
          type: string
          description: Optional, defaults to memo bodyMd
        status:
          $ref: '#/components/schemas/TaskStatus'
        scheduledOn:
          type: string
          format: date
          nullable: true
        labels:
          type: array
          items:
            type: string

    # ==================
    # Task schemas
    # ==================
    TaskStatus:
      type: string
      enum: [open, next, waiting, scheduled, done, canceled]

    Task:
      type: object
      required: [id, type, title, bodyMd, status, isBookmarked, createdAt, updatedAt]
      properties:
        id:
          type: integer
          example: 10
        type:
          type: string
          enum: [task]
        title:
          type: string
          example: "Buy groceries"
        bodyMd:
          type: string
          example: ""
        status:
          $ref: '#/components/schemas/TaskStatus'
        scheduledOn:
          type: string
          format: date
          nullable: true
        isBookmarked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskDetail:
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            labels:
              type: array
              items:
                $ref: '#/components/schemas/Label'
            comments:
              type: array
              items:
                $ref: '#/components/schemas/Comment'

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        bodyMd:
          type: string
          default: ""
        status:
          $ref: '#/components/schemas/TaskStatus'
          default: open
        scheduledOn:
          type: string
          format: date
          nullable: true
        labels:
          type: array
          items:
            type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        bodyMd:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        scheduledOn:
          type: string
          format: date
          nullable: true

    # ==================
    # Label schemas
    # ==================
    Label:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
          example: 5
        name:
          type: string
          example: "urgent"
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateLabelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        description:
          type: string
          maxLength: 200

    AssignLabelRequest:
      type: object
      required: [labelId]
      properties:
        labelId:
          type: integer

    # ==================
    # Link schemas
    # ==================
    LinkType:
      type: string
      enum: [parent, child, relates, derived_from]

    Link:
      type: object
      required: [id, sourceId, targetId, linkType, createdAt]
      properties:
        id:
          type: integer
        sourceId:
          type: integer
        targetId:
          type: integer
        linkType:
          $ref: '#/components/schemas/LinkType'
        createdAt:
          type: string
          format: date-time

    LinkWithDirection:
      allOf:
        - $ref: '#/components/schemas/Link'
        - type: object
          required: [direction]
          properties:
            direction:
              type: string
              enum: [outgoing, incoming]

    CreateLinkRequest:
      type: object
      required: [type, sourceId, targetId]
      properties:
        type:
          $ref: '#/components/schemas/LinkType'
        sourceId:
          type: integer
        targetId:
          type: integer

    # ==================
    # Comment schemas
    # ==================
    Comment:
      type: object
      required: [id, issueId, bodyMd, createdAt, updatedAt]
      properties:
        id:
          type: integer
        issueId:
          type: integer
        bodyMd:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required: [bodyMd]
      properties:
        bodyMd:
          type: string
          minLength: 1

    UpdateCommentRequest:
      type: object
      required: [bodyMd]
      properties:
        bodyMd:
          type: string
          minLength: 1

    # ==================
    # Error schemas
    # ==================
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Resource not found"
        code:
          type: string
          example: "RESOURCE_NOT_FOUND"
        details:
          type: object
        requestId:
          type: string

    ValidationErrorResponse:
      type: object
      required: [error, code, details]
      properties:
        error:
          type: string
          example: "Validation failed"
        code:
          type: string
          example: "VALIDATION_ERROR"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
              receivedValue:
                type: object

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Issue #123 not found"
            code: "RESOURCE_NOT_FOUND"

    Conflict:
      description: Resource conflict (e.g., UNIQUE constraint violation)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Resource already exists"
            code: "SQLITE_CONSTRAINT_UNIQUE"
