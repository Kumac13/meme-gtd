openapi: 3.0.3
info:
  title: meme-gtd Links API
  description: Link management endpoints for issue relationships
  version: 0.6.0

paths:
  /api/links:
    post:
      operationId: createLink
      summary: Create link
      tags:
        - Links
      description: Create a link between two issues
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceIssueId:
                  type: integer
                  exclusiveMinimum: true
                  minimum: 0
                  description: Source issue ID
                targetIssueId:
                  type: integer
                  exclusiveMinimum: true
                  minimum: 0
                  description: Target issue ID
                linkType:
                  type: string
                  enum:
                    - parent
                    - child
                    - relates
                    - derived_from
                  description: Type of relationship between issues
              required:
                - sourceIssueId
                - targetIssueId
                - linkType
              additionalProperties: false
        required: true
      responses:
        '201':
          description: Link created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Unique link ID
                  sourceIssueId:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Source issue ID
                  targetIssueId:
                    type: integer
                    exclusiveMinimum: true
                    minimum: 0
                    description: Target issue ID
                  linkType:
                    type: string
                    enum:
                      - parent
                      - child
                      - relates
                      - derived_from
                    description: Type of relationship
                  createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp
                required:
                  - id
                  - sourceIssueId
                  - targetIssueId
                  - linkType
                  - createdAt
                additionalProperties: false
        '400':
          description: Validation error (circular hierarchy, duplicate link, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                circularHierarchy:
                  summary: Circular hierarchy detected
                  value:
                    error: ValidationError
                    message: 'Cannot create link: This would create a circular hierarchy'
                duplicateLink:
                  summary: Duplicate link
                  value:
                    error: ValidationError
                    message: 'Link already exists between these issues'
                selfLink:
                  summary: Self-referencing link
                  value:
                    error: ValidationError
                    message: 'Cannot create link from issue to itself'
        '404':
          description: Source or target issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                issueNotFound:
                  summary: Issue not found
                  value:
                    error: NotFoundError
                    message: 'Issue not found'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/issues/{id}/links:
    get:
      operationId: listIssueLinks
      summary: List issue links
      tags:
        - Links
      description: List all links for a given issue with direction and target issue information
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Issue ID (memo or task)
      responses:
        '200':
          description: List of links with target issue information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LinkWithTarget'
              examples:
                multipleLinks:
                  summary: Issue with multiple links
                  value:
                    - id: 12
                      sourceIssueId: 3
                      targetIssueId: 5
                      linkType: parent
                      direction: outgoing
                      targetIssue:
                        id: 5
                        type: task
                        title: Implement authentication
                      createdAt: '2025-10-24T10:30:00Z'
                    - id: 13
                      sourceIssueId: 7
                      targetIssueId: 3
                      linkType: relates
                      direction: incoming
                      targetIssue:
                        id: 7
                        type: memo
                        title: Research authentication libraries
                      createdAt: '2025-10-24T11:00:00Z'
                noLinks:
                  summary: Issue with no links
                  value: []
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                issueNotFound:
                  summary: Issue not found
                  value:
                    error: NotFoundError
                    message: 'Issue not found'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/links/{id}:
    delete:
      operationId: deleteLink
      summary: Delete link
      tags:
        - Links
      description: Delete a link by ID (bidirectional - removes the relationship)
      parameters:
        - schema:
            type: string
            pattern: ^\d+$
          in: path
          name: id
          required: true
          description: Link ID
      responses:
        '204':
          description: Link deleted successfully (no content)
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                linkNotFound:
                  summary: Link not found
                  value:
                    error: NotFoundError
                    message: 'Link not found'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LinkWithTarget:
      type: object
      properties:
        id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          description: Unique link ID
        sourceIssueId:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          description: Source issue ID
        targetIssueId:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          description: Target issue ID
        linkType:
          type: string
          enum:
            - parent
            - child
            - relates
            - derived_from
          description: Type of relationship
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        direction:
          type: string
          enum:
            - outgoing
            - incoming
          description: Link direction relative to the queried issue
        targetIssue:
          type: object
          description: Target issue information (added in PR #42)
          properties:
            id:
              type: integer
              exclusiveMinimum: true
              minimum: 0
              description: Target issue ID
            type:
              type: string
              enum:
                - task
                - memo
              description: Target issue type
            title:
              type: string
              description: Target issue title (or preview text for memos)
          required:
            - id
            - type
            - title
          additionalProperties: false
      required:
        - id
        - sourceIssueId
        - targetIssueId
        - linkType
        - createdAt
        - direction
        - targetIssue
      additionalProperties: false

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error type or name
        code:
          type: string
          description: Error code (optional)
        message:
          type: string
          description: Human-readable error message
        stack:
          type: string
          description: Stack trace (only in development)
      required:
        - error
        - message
      additionalProperties: false

servers:
  - url: http://localhost:3000
    description: Production server
  - url: http://localhost:3001
    description: Development/test server

tags:
  - name: Links
    description: Link management endpoints for issue relationships
