# Example API Requests
#
# Single label filter:
#   curl http://localhost:3001/api/tasks?label=bug
#
# Multiple labels (OR logic):
#   curl http://localhost:3001/api/tasks?label=bug,enhancement
#
# Combined filters (AND logic):
#   curl http://localhost:3001/api/tasks?label=bug&status=open
#   curl http://localhost:3001/api/tasks?label=bug,enhancement&status=open&bookmarked=true
#
# Label with spaces (URL-encoded):
#   curl "http://localhost:3001/api/tasks?label=needs%20review"
#
# No matches (returns empty array):
#   curl http://localhost:3001/api/tasks?label=nonexistent
#   → []

