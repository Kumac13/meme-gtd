# OpenAPI 3.0 Contract Updates for Label Filtering

# This file documents the changes to be made to packages/api/docs/api/openapi.yaml
# These are ADDITIONS to existing endpoints, not a complete API specification

openapi: 3.0.3
info:
  title: meme-gtd API - Label Filtering Updates
  version: 0.9.0
  description: |
    API contract updates for feature 024-tasks-memos-label.
    These changes add label filtering capabilities to existing task and memo list endpoints.

paths:
  /api/tasks:
    get:
      summary: List tasks with optional filtering
      operationId: listTasks
      tags:
        - Tasks
      parameters:
        # EXISTING PARAMETERS (keep unchanged)
        - name: status
          in: query
          description: Filter by task status
          required: false
          schema:
            type: string
            enum: [open, next, waiting, scheduled, done, canceled]
          example: open

        - name: bookmarked
          in: query
          description: Filter by bookmark status
          required: false
          schema:
            type: string
            enum: ['true', 'false']
          example: 'true'

        # ⭐ NEW PARAMETER - Label filtering
        - name: label
          in: query
          description: |
            Filter by label name(s). Supports:
            - Single label: `?label=bug`
            - Multiple labels (OR logic): `?label=bug,enhancement,documentation`

            Label matching is case-insensitive.
            Returns tasks that have ANY of the specified labels (OR logic).
            Combine with other parameters for AND logic (e.g., `?label=bug&status=open`).
          required: false
          schema:
            type: string
          examples:
            single:
              summary: Single label
              value: bug
            multiple:
              summary: Multiple labels (OR logic)
              value: bug,enhancement,documentation
            quoted:
              summary: Label with spaces (URL-encoded)
              value: needs%20review

      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              examples:
                filtered:
                  summary: Tasks filtered by label=bug
                  value:
                    - id: 1
                      type: task
                      title: "Fix login issue"
                      status: open
                      labels:
                        - { id: 1, name: "bug", description: "Bug fixes" }
                      created_at: "2025-11-01T10:00:00Z"
                      updated_at: "2025-11-01T10:00:00Z"
                      is_bookmarked: false
                    - id: 3
                      type: task
                      title: "Memory leak in dashboard"
                      status: open
                      labels:
                        - { id: 1, name: "bug", description: "Bug fixes" }
                        - { id: 5, name: "high-priority", description: null }
                      created_at: "2025-11-02T14:30:00Z"
                      updated_at: "2025-11-02T14:30:00Z"
                      is_bookmarked: true

                empty:
                  summary: No tasks match the filter
                  value: []

        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidStatus:
                  summary: Invalid status value
                  value:
                    error: "Invalid query parameter"
                    details: "status must be one of: open, next, waiting, scheduled, done, canceled"

        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/memos:
    get:
      summary: List memos with optional filtering
      operationId: listMemos
      tags:
        - Memos
      parameters:
        # EXISTING PARAMETERS (keep unchanged)
        - name: bookmarked
          in: query
          description: Filter by bookmark status
          required: false
          schema:
            type: string
            enum: ['true', 'false']
          example: 'true'

        # ⭐ NEW PARAMETER - Label filtering
        - name: label
          in: query
          description: |
            Filter by label name(s). Supports:
            - Single label: `?label=idea`
            - Multiple labels (OR logic): `?label=idea,meeting-notes,todo`

            Label matching is case-insensitive.
            Returns memos that have ANY of the specified labels (OR logic).

            Note: Status filtering is not available for memos (memos don't have status).
          required: false
          schema:
            type: string
          examples:
            single:
              summary: Single label
              value: idea
            multiple:
              summary: Multiple labels (OR logic)
              value: idea,meeting-notes,todo

      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memo'
              examples:
                filtered:
                  summary: Memos filtered by label=idea
                  value:
                    - id: 10
                      type: memo
                      body_md: "Consider using WebSockets for real-time updates"
                      labels:
                        - { id: 3, name: "idea", description: "Feature ideas" }
                        - { id: 7, name: "technical", description: null }
                      created_at: "2025-11-03T09:15:00Z"
                      updated_at: "2025-11-03T09:15:00Z"
                      is_bookmarked: false

                empty:
                  summary: No memos match the filter
                  value: []

        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Task:
      type: object
      required: [id, type, title, status, labels, created_at, updated_at, is_bookmarked]
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum: [task]
        title:
          type: string
          example: "Fix login issue"
        body_md:
          type: string
          description: Markdown content
          example: "Users report 500 errors when logging in with SSO"
        status:
          type: string
          enum: [open, next, waiting, scheduled, done, canceled]
          example: open
        scheduled_on:
          type: string
          format: date
          nullable: true
          example: "2025-11-15"
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        created_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        is_bookmarked:
          type: boolean
          example: false

    Memo:
      type: object
      required: [id, type, body_md, labels, created_at, updated_at, is_bookmarked]
      properties:
        id:
          type: integer
          example: 10
        type:
          type: string
          enum: [memo]
        body_md:
          type: string
          description: Markdown content
          example: "Consider using WebSockets for real-time updates"
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        created_at:
          type: string
          format: date-time
          example: "2025-11-03T09:15:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-11-03T09:15:00Z"
        is_bookmarked:
          type: boolean
          example: false

    Label:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "bug"
          description: Case-insensitive unique label name
        description:
          type: string
          nullable: true
          example: "Bug fixes"
        created_at:
          type: string
          format: date-time
          example: "2025-10-01T00:00:00Z"

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Invalid query parameter"
        details:
          type: string
          example: "status must be one of: open, next, waiting, scheduled, done, canceled"

