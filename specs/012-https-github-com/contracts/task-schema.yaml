# OpenAPI Schema: Task with Comment Count
# Feature: Add Comment Count to API List Responses
# Endpoint: GET /api/tasks

TaskSchema:
  type: object
  required:
    - id
    - type
    - title
    - bodyMd
    - status
    - scheduledOn
    - meta
    - isBookmarked
    - isDeleted
    - createdAt
    - updatedAt
    - labels
    - commentCount
  properties:
    id:
      type: integer
      format: int32
      minimum: 1
      description: Unique task ID
      example: 101

    type:
      type: string
      enum: [task]
      description: Issue type (always "task")
      example: task

    title:
      type: string
      description: Task title
      example: "Implement comment count feature"

    bodyMd:
      type: string
      description: Task description in Markdown format
      example: "Add commentCount field to list endpoints"

    status:
      type: string
      enum: [open, next, waiting, scheduled, done, canceled]
      description: Current task status
      example: next

    scheduledOn:
      type: string
      format: date
      nullable: true
      description: Scheduled date for the task (YYYY-MM-DD, null if not scheduled)
      example: "2025-10-25"

    meta:
      type: object
      additionalProperties: true
      description: Metadata object
      example: {}

    isBookmarked:
      type: boolean
      description: Whether the task is bookmarked
      example: false

    isDeleted:
      type: boolean
      description: Whether the task is soft-deleted
      example: false

    createdAt:
      type: string
      format: date-time
      description: Creation timestamp (ISO 8601)
      example: "2025-10-21T10:30:00Z"

    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp (ISO 8601)
      example: "2025-10-21T14:45:00Z"

    labels:
      type: array
      items:
        type: string
      description: Array of label names assigned to this task
      example: ["backend", "priority-high"]

    commentCount:
      type: integer
      format: int32
      minimum: 0
      description: Number of non-deleted comments on this task
      example: 5

# Response Schema for GET /api/tasks
TaskListResponse:
  type: array
  items:
    $ref: '#/TaskSchema'
  example:
    - id: 101
      type: task
      title: "Review API design"
      bodyMd: "Complete review by EOD"
      status: next
      scheduledOn: null
      meta: {}
      isBookmarked: true
      isDeleted: false
      createdAt: "2025-10-20T10:00:00Z"
      updatedAt: "2025-10-21T12:00:00Z"
      labels: ["backend"]
      commentCount: 3
    - id: 102
      type: task
      title: "Write documentation"
      bodyMd: "Update README with new features"
      status: scheduled
      scheduledOn: "2025-10-25"
      meta: {}
      isBookmarked: false
      isDeleted: false
      createdAt: "2025-10-21T09:00:00Z"
      updatedAt: "2025-10-21T09:00:00Z"
      labels: ["docs"]
      commentCount: 0

# Query Parameters for GET /api/tasks
TaskQueryParams:
  type: object
  properties:
    status:
      type: string
      enum: [open, next, waiting, scheduled, done, canceled]
      description: Filter by task status
      example: next
    bookmarked:
      type: string
      enum: [true, false]
      description: Filter by bookmark status
      example: "true"
