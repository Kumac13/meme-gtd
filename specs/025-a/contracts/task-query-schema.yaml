# OpenAPI Schema Fragment: Task Query Parameters
# Feature: 025-a - Fuzzy Search
# This fragment extends the existing GET /api/tasks endpoint

TaskQueryParameters:
  - name: status
    in: query
    required: false
    schema:
      type: string
      enum: [open, next, waiting, scheduled, done, canceled]
    description: Filter tasks by status

  - name: bookmarked
    in: query
    required: false
    schema:
      type: string
      enum: ['true', 'false']
    description: Filter by bookmark status

  - name: label
    in: query
    required: false
    schema:
      type: string
    description: |
      Filter by label name(s). Supports comma-separated values for OR logic.
      Example: bug,enhancement

  - name: search
    in: query
    required: false
    schema:
      type: string
      minLength: 1
    description: |
      🆕 NEW: Search tasks by title using free-text partial matching.
      - Case-insensitive substring search
      - Supports multi-word queries with implicit AND logic
      - Example: "login screen" matches tasks with both "login" AND "screen" in title
      - Unicode-aware (supports Japanese, emoji, etc.)
    example: "login screen"

TaskResponseSchema:
  type: object
  required:
    - id
    - type
    - title
    - bodyMd
    - status
    - scheduledOn
    - meta
    - createdAt
    - updatedAt
    - isBookmarked
    - isDeleted
    - labels
  properties:
    id:
      type: integer
      format: int64
      description: Unique task ID
    type:
      type: string
      enum: [task]
      description: Issue type (always "task")
    title:
      type: string
      description: Task title
    bodyMd:
      type: string
      description: Task description in Markdown format
    status:
      type: string
      enum: [open, next, waiting, scheduled, done, canceled]
      description: Current task status
    scheduledOn:
      type: string
      format: date
      nullable: true
      description: Scheduled date (YYYY-MM-DD, null if not scheduled)
    meta:
      type: object
      additionalProperties: true
      description: Metadata object
    createdAt:
      type: string
      format: date-time
      description: Creation timestamp
    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp
    isBookmarked:
      type: boolean
      description: Whether the task is bookmarked
    isDeleted:
      type: boolean
      description: Whether the task is soft-deleted
    labels:
      type: array
      items:
        type: string
      description: Array of label names assigned to this task
    commentCount:
      type: integer
      format: int32
      description: Number of non-deleted comments on this task
    preview:
      type: string
      nullable: true
      description: |
        🆕 NEW: Context preview with highlighted search terms (only present when search parameter is active).
        Contains HTML markers: <mark>search term</mark>
        Maximum ~50 characters
      example: "Implement OAuth <mark>login</mark> <mark>screen</mark> feature"
