# OpenAPI Schema Fragment: Memo Query Parameters
# Feature: 025-a - Fuzzy Search
# This fragment extends the existing GET /api/memos endpoint

MemoQueryParameters:
  - name: bookmarked
    in: query
    required: false
    schema:
      type: string
      enum: ['true', 'false']
    description: Filter by bookmark status

  - name: label
    in: query
    required: false
    schema:
      type: string
    description: |
      Filter by label name(s). Supports comma-separated values for OR logic.
      Example: idea,meeting-notes

  - name: search
    in: query
    required: false
    schema:
      type: string
      minLength: 1
    description: |
      🆕 NEW: Search memos by body content using free-text partial matching.
      - Case-insensitive substring search
      - Supports multi-word queries with implicit AND logic
      - Example: "quarterly review" matches memos with both "quarterly" AND "review" in body
      - Unicode-aware (supports Japanese, emoji, etc.)
      - Returns results with 50-character context preview
    example: "quarterly review"

MemoResponseSchema:
  type: object
  required:
    - id
    - type
    - title
    - bodyMd
    - status
    - scheduledOn
    - meta
    - createdAt
    - updatedAt
    - isBookmarked
    - isDeleted
    - labels
  properties:
    id:
      type: integer
      format: int64
      description: Unique memo ID
    type:
      type: string
      enum: [memo]
      description: Issue type (always "memo")
    title:
      type: string
      nullable: true
      description: Title (always null for memos)
    bodyMd:
      type: string
      description: Memo content in Markdown format
    status:
      type: string
      nullable: true
      description: Status (always null for memos)
    scheduledOn:
      type: string
      format: date
      nullable: true
      description: Scheduled date (always null for memos)
    meta:
      type: object
      additionalProperties: true
      description: Metadata object
    createdAt:
      type: string
      format: date-time
      description: Creation timestamp
    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp
    isBookmarked:
      type: boolean
      description: Whether the memo is bookmarked
    isDeleted:
      type: boolean
      description: Whether the memo is soft-deleted
    labels:
      type: array
      items:
        type: string
      description: Array of label names assigned to this memo
    commentCount:
      type: integer
      format: int32
      description: Number of non-deleted comments on this memo
    preview:
      type: string
      nullable: true
      description: |
        🆕 NEW: Context preview with highlighted search terms (only present when search parameter is active).
        Shows where search term appears in body with surrounding context.
        Contains HTML markers: <mark>search term</mark>
        Maximum 50 characters (truncated with ellipsis if longer)
      example: "...discussed <mark>quarterly</mark> <mark>review</mark> with client..."
