  // Verify label is removed from task detail
  await expect(page.locator('text=bug')).not.toBeVisible();
});
```

## Security Considerations

### Authorization

**Note**: The current API does not implement authentication or authorization. When auth is added:

- Users should only be able to remove labels from items they have permission to modify
- Consider adding permission checks in the handler

### SQL Injection

**Mitigation**: Use parameterized queries (already done in example implementation)

```typescript
// ✅ Safe: parameterized query
db.prepare('DELETE FROM issue_labels WHERE issue_id = ? AND label_id = ?')
  .run(issueId, labelId);

// ❌ Unsafe: string concatenation (DO NOT DO THIS)
db.exec(`DELETE FROM issue_labels WHERE issue_id = ${issueId}`);
```

