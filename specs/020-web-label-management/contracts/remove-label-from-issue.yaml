## Alternative Designs Rejected

### Alternative 1: PATCH /api/issues/:issueId/labels

**Approach**: Send array of label IDs to replace all labels

```json
PATCH /api/issues/123/labels
{
  "labelIds": [1, 2, 3]
}
```

**Why Rejected**:
- Requires fetching current labels first (extra round trip)
- Risk of race conditions if labels change between fetch and update
- Less RESTful than DELETE for removal operation
- More complex client logic

### Alternative 2: POST /api/issues/:issueId/labels/remove

**Approach**: Use POST with action verb in path

```json
POST /api/issues/123/labels/remove
{
  "labelId": 42
}
```

**Why Rejected**:
- Not RESTful (should use HTTP verbs, not action in path)
- Inconsistent with REST API design principles
- DELETE is the semantically correct verb for removal

### Alternative 3: Use existing setMemoLabels() / setTaskLabels()

**Current API**: Replace all labels at once

**Why Rejected**:
- Already covered in "Motivation" section
- Poor UX due to race conditions and complexity
- Not suitable for single label removal

## Summary

**New Endpoint**: `DELETE /api/issues/:issueId/labels/:labelId`

**Key Design Decisions**:
- ✅ RESTful design (DELETE verb, resource path)
- ✅ Idempotent (succeeds even if label not assigned)
- ✅ 204 No Content on success (standard for DELETE)
- ✅ Validates both issue and label exist
- ✅ Simple implementation (single SQL DELETE)

