# API Contract: Remove Label from Issue

## Endpoint

**DELETE** `/api/issues/:issueId/labels/:labelId`

## Purpose

Remove a single label assignment from a specific issue (memo or task) without affecting other labels assigned to the same issue.

## Motivation

The existing label API only supports:
1. **Assign** label to issue: `POST /api/issues/:issueId/labels` (adds one label)
2. **Replace all** labels for issue: `setMemoLabels()` / `setTaskLabels()` (full replacement)

There is **no way to remove a single label** without:
- Fetching all current labels
- Removing one from the list
- Sending the entire updated list back

This endpoint provides a clean, RESTful way to remove individual label assignments, matching the user story #3 (Priority P2): "Remove Labels from Items".

## OpenAPI Specification

```yaml
/api/issues/{issueId}/labels/{labelId}:
  delete:
    operationId: removeLabelFromIssue
    summary: Remove label from issue
    tags:
      - Labels
    description: Remove a label assignment from an issue (memo or task)
    parameters:
      - schema:
          type: string
          pattern: '^\d+$'
        in: path
        name: issueId
        required: true
        description: Issue ID (memo or task)
      - schema:
          type: integer
          minimum: 1
        in: path
        name: labelId
        required: true
        description: Label ID to remove
    responses:
      "204":
        description: Label removed successfully (no content)
      "404":
        description: Issue or label not found, or label not assigned to issue
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  description: Error type or name
                code:
                  type: string
                  description: Error code
                message:
                  type: string
                  description: Human-readable error message
                stack:
                  type: string
                  description: Stack trace (only in development)
              required:
                - error
                - message
              additionalProperties: false
      "400":
        description: Invalid request (e.g., non-numeric issueId or labelId)
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                code:
                  type: string
                message:
                  type: string
                stack:
                  type: string
              required:
                - error
                - message
              additionalProperties: false
```

## Request

### Path Parameters

| Parameter | Type    | Required | Description                |
|-----------|---------|----------|----------------------------|
| issueId   | string  | Yes      | Issue ID (memo or task) - numeric string |
| labelId   | integer | Yes      | Label ID to remove (numeric) |

### Request Body

None (DELETE endpoint with no body)

### Example Request

```bash
DELETE /api/issues/123/labels/42
```

## Response

### Success Response (204 No Content)

**Status Code**: 204
**Body**: Empty

The label was successfully removed from the issue (or was not assigned in the first place, making this operation idempotent).

### Error Responses

#### 404 Not Found

**Conditions**:
- Issue with specified ID does not exist
- Label with specified ID does not exist
- Label is not assigned to the issue (optional: could be idempotent instead)

**Response Body**:
```json
{
  "error": "NotFoundError",
  "code": "NOT_FOUND",
  "message": "Issue 123 not found"
}
```

or

```json
{
  "error": "NotFoundError",
  "code": "NOT_FOUND",
  "message": "Label 42 not found"
}
```

or (optional - could be 204 instead for idempotency):

```json
{
  "error": "NotFoundError",
  "code": "NOT_FOUND",
  "message": "Label 42 is not assigned to issue 123"
}
```

#### 400 Bad Request

**Conditions**:
- issueId is not a valid numeric string
- labelId is not a valid integer

**Response Body**:
```json
{
  "error": "ValidationError",
  "code": "INVALID_REQUEST",
  "message": "Invalid issueId: must be a numeric string"
}
```

## Implementation Details

### Database Operation

```sql
DELETE FROM issue_labels
WHERE issue_id = :issueId AND label_id = :labelId;
```

### Idempotency Consideration

**Recommendation**: Make this operation **idempotent**.

- If label is not assigned to the issue, return **204 No Content** (not 404)
- This matches REST best practices: DELETE should succeed if the desired state (label not assigned) is already true
- Simplifies client logic: no need to check current state before removing

**SQL Check**:
```sql
-- Check if label assignment exists
SELECT 1 FROM issue_labels
WHERE issue_id = :issueId AND label_id = :labelId;

-- If not found, still return 204
-- If found, delete and return 204
```

### Repository Function

Add to `packages/db/src/labelRepository.ts`:

```typescript
/**
 * Remove a label from an issue
 * Idempotent: succeeds even if label is not assigned
 * @throws {Error} if issue or label does not exist
 */
export function detachLabelFromIssue(
  db: Database.Database,
  issueId: number,
  labelId: number
): void {
  // Validate issue exists
  const issue = db.prepare('SELECT id FROM issues WHERE id = ?').get(issueId);
  if (!issue) {
    throw new Error(`Issue ${issueId} not found`);
  }

  // Validate label exists
  const label = db.prepare('SELECT id FROM labels WHERE id = ?').get(labelId);
  if (!label) {
    throw new Error(`Label ${labelId} not found`);
  }

  // Remove assignment (idempotent)
  db.prepare('DELETE FROM issue_labels WHERE issue_id = ? AND label_id = ?')
    .run(issueId, labelId);
}
```

### Handler

Add to `packages/api/src/routes/labels.ts`:

```typescript
// DELETE /api/issues/:issueId/labels/:labelId
server.delete(
  '/issues/:issueId/labels/:labelId',
  {
    schema: {
      params: z.object({
        issueId: z.string().regex(/^\d+$/),
        labelId: z.coerce.number().int().positive(),
      }),
    },
  },
  async (request, reply) => {
    const { issueId, labelId } = request.params;

    try {
      detachLabelFromIssue(db, Number(issueId), labelId);
      reply.code(204).send();
    } catch (error) {
      if (error.message.includes('not found')) {
        reply.code(404).send({
          error: 'NotFoundError',
          code: 'NOT_FOUND',
          message: error.message,
        });
      } else {
        throw error;
      }
    }
  }
);
```

## Testing Requirements

### Integration Tests

Add to `packages/api/test/integration/labels.test.ts`:

```typescript
describe('DELETE /api/issues/:issueId/labels/:labelId', () => {
  it('should remove label from issue', async () => {
    // Setup: Create label and assign to issue
    const label = await createLabel('test-label');
    const memo = await createMemo('Test memo');
    await assignLabelToIssue(memo.id, label.id);

    // Act: Remove label
    const response = await request(app)
      .delete(`/api/issues/${memo.id}/labels/${label.id}`)
      .expect(204);

    // Assert: Label no longer assigned
    const updatedMemo = await getMemo(memo.id);
    expect(updatedMemo.labels).not.toContain('test-label');
  });

  it('should return 404 when issue not found', async () => {
    const label = await createLabel('test-label');

    const response = await request(app)
      .delete(`/api/issues/99999/labels/${label.id}`)
      .expect(404);

    expect(response.body.error).toBe('NotFoundError');
    expect(response.body.message).toContain('Issue 99999 not found');
  });

  it('should return 404 when label not found', async () => {
    const memo = await createMemo('Test memo');

    const response = await request(app)
      .delete(`/api/issues/${memo.id}/labels/99999`)
      .expect(404);

    expect(response.body.error).toBe('NotFoundError');
    expect(response.body.message).toContain('Label 99999 not found');
  });

  it('should be idempotent (succeed when label not assigned)', async () => {
    const label = await createLabel('test-label');
    const memo = await createMemo('Test memo');
    // Note: label is NOT assigned to memo

    // Should succeed (204) even though label is not assigned
    await request(app)
      .delete(`/api/issues/${memo.id}/labels/${label.id}`)
      .expect(204);
  });

  it('should return 400 when issueId is invalid', async () => {
    const response = await request(app)
      .delete('/api/issues/not-a-number/labels/1')
      .expect(400);

    expect(response.body.error).toBe('ValidationError');
  });
});
```

